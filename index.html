<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1211" />
    <title>ServOS</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Per-instance branding: the POSUP production instance gets its own
      // home-screen icons + manifest. Runs at parse time, before the icons
      // are fetched, so saved-to-phone apps pick up the right artwork.
      (function () {
        if (!/^posupcrm\./.test(location.hostname)) return;
        var set = function (sel, href) {
          var el = document.querySelector(sel);
          if (el) el.href = href;
        };
        set('link[rel="manifest"]', '/posup/manifest.webmanifest');
        set('link[rel="apple-touch-icon"]', '/posup/apple-touch-icon.png');
        set('link[rel="icon"][type="image/png"]', '/posup/favicon-32.png');
        var svg = document.querySelector('link[rel="icon"][type="image/svg+xml"]');
        if (svg) { svg.type = 'image/png'; svg.href = '/posup/icon-192.png'; }
        var t = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (t) t.content = 'POSUP';
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ServOS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
